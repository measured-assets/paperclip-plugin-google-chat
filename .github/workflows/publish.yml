name: Publish

# Publishes to npm on a GitHub Release (and on manual dispatch). Uses npm OIDC
# "trusted publishing" — no NPM_TOKEN secret. One-time setup on npmjs.com:
# the package's Settings → Trusted Publishers must list this repo + this workflow.
# Provenance attestation is emitted automatically (id-token: write below).

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance + OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      # OIDC trusted-publishing AUTH (not just provenance) needs npm >= 11.5.1;
      # the Node 20 runner ships npm 10.x, which signs provenance but PUTs the
      # package unauthenticated -> registry 404. Upgrade before publishing.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest
      - name: Install
        run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Publish
        run: npm publish --provenance --access public
